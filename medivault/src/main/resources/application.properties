spring.application.name=medivault

# Server
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3308/medivault_db
spring.datasource.username=root
spring.datasource.password=EURU
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Jackson \u2014 removed WRITE_DATES_AS_TIMESTAMPS, not supported in Jackson 3.x
spring.jackson.time-zone=Asia/Kolkata

# Docker Compose auto-start
spring.docker.compose.enabled=true
spring.docker.compose.file=compose.yml
spring.docker.compose.lifecycle-management=start-and-stop
spring.docker.compose.readiness.wait=always
spring.docker.compose.readiness.timeout=120s